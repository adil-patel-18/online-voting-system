<!DOCTYPE html>
<html>
<head>
<title>Online Voting System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f1f5f9;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#2563eb;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.header h2{
font-weight:600;
letter-spacing:1px;
}

.nav a{
color:#e0f2fe;
margin-left:20px;
text-decoration:none;
font-weight:500;
transition:0.3s;
}

.nav a:hover{
color:#ffffff;
}

/* MAIN CONTAINER */
.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* FORM BOX */
.box{
background:white;
padding:40px;
width:350px;
border-radius:20px;
box-shadow:0 20px 50px rgba(37,99,235,0.2);
transition:0.3s;
}

h3{
text-align:center;
color:#2563eb;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #cbd5e1;
transition:0.3s;
}

input:focus{
border-color:#2563eb;
outline:none;
box-shadow:0 0 8px rgba(37,99,235,0.3);
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
font-weight:600;
transition:0.3s;
margin-top:10px;
}

.back-btn{
background:#5293e3;
}

/* FOOTER */
footer{
text-align:center;
color:white;
padding:15px;
font-size:14px;
background:#2563eb;
}
a{
text-decoration:none;
}
</style>
</head>

<body>
<div class="header">
<h2>Online Voting</h2>
<div class="nav">
<a href="index.html">Home</a>
<a href="admin_login">Admin</a>
</div>
</div>

<div class="container">
<div class="box">
<h3>Voter Login </h3>

<form method="POST">
<input type="text" name="voter_id" placeholder="Voter ID" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<button><a href="admin_login" style="color:white;"> <- Previous Page</button>

</div>
</div>

<footer>
© 2026 Online Voting System
</footer>

</body>
</html>
