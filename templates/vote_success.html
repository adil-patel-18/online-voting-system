<!DOCTYPE html>
<html>
<head>
<title>Vote Success</title>
<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#1d4ed8;
    color:white;
}

.box {
    text-align:center;
    background:white;
    padding:50px 70px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    width:400px;
}

h1 {
    font-size:36px;
    margin-bottom:20px;
    color:#1d4ed8;
}

p {
    font-size:18px;
    margin-bottom:25px;
    color:#2563eb;
    font-weight:500;
}

a {
    display:inline-block;
    padding:12px 25px;
    background:#1d4ed8;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}
</style>
</head>
<body>
<div class="box">
<h1>Vote Successfully </h1>
<p>You voted for: <strong>{{ party }}</strong></p>
<a href="/voter_login">Back to Login</a>
</div>
</body>
</html>
