<!DOCTYPE html>
<html>
<head>
<title>Online Voting System</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f1f5f9;
height:100vh;
display:flex;
flex-direction:column;
}
.header{
background:#2563eb;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.header h2{
font-weight:600;
letter-spacing:1px;
}
.nav a{
color:#e0f2fe;
margin-left:20px;
text-decoration:none;
transition:0.3s;
font-weight:500;
}

.nav a:hover{
color:#ffffff;
}
.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}
.form-box{
background:white;
padding:40px;
width:380px;
border-radius:20px;
box-shadow:0 20px 50px rgba(37,99,235,0.2);
transition:0.3s;
}
h3{
text-align:center;
margin-bottom:25px;
color:#2563eb;
font-size:22px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #cbd5e1;
transition:0.3s;
}

input:focus{
border-color:#2563eb;
outline:none;
box-shadow:0 0 8px rgba(37,99,235,0.3);
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
font-weight:600;
}
footer{
text-align:center;
color:#f9fafe;
padding:15px;
font-size:14px;
background:#2563eb;
}
</style>
</head>

<body>
<div class="header">
<h2>Online Voting</h2>
<div class="nav">
<a href="admin_login">Login</a>
</div>
</div>
<div class="container">
<div class="form-box">
<h3>Admin Signup</h3>
<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Signup</button>
</form>
</div>
</div>
<footer>
© 2026 Online Voting system
</footer>

</body>
</html>
