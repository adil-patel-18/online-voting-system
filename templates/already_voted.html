<!DOCTYPE html>
<html>
<head>
<title>Already Voted</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.box{
text-align:center;
background:white;
padding:50px 70px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

h1{
font-size:40px;
color:#ef4444;
margin-bottom:15px;
}

p{
font-size:18px;
color:#475569;
margin-bottom:25px;
}

a{
display:inline-block;
padding:12px 25px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:600;
transition:0.3s;
}
</style>

</head>

<body>

<div class="box">
<h1>Already Voted</h1>
<p>You have already cast your vote. You cannot vote again.</p>
<a href="/voter_login">Back to Login</a>
</div>

</body>
</html>
