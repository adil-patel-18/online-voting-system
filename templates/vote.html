<!DOCTYPE html>
<html>
<head>
<title>Vote</title>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f1f5f9;
font-family:'Segoe UI';
}
.box{
background:white;
padding:40px;
width:400px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
h2{
text-align:center;
color:#1d4ed8;
margin-bottom:20px;
}
select,button{width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #cbd5e1;
}
button{
background:#1d4ed8;
color:white;
border:none;
}
</style>
</head>
<body>
<div class="box">
<h2>Select Party</h2>
<form method="POST">
<select name="party">
{% for p in parties %}
<option value="{{p}}">{{p}}</option>
{% endfor %}
</select>
<button>Cast Vote</button>
</form>
</div>
</body>
</html>
