<!DOCTYPE html>
<html>
<head>
<title>online voting system</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}
body{
background:#f1f5f9;
}
.header{background:#1d4ed8;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}
.nav{display:flex;
gap:25px;
align-items:center;
}
.nav a{color:#e0f2fe;
text-decoration:none;
font-weight:500;
transition:0.3s;}
.nav a:hover{color:white;
}
.admin-name{
background:white;
color:#1d4ed8;
padding:6px 15px;
border-radius:20px;
font-size:14px;
}
.main{padding:40px 60px;
 display:flex;
 flex-direction:column;
 align-items:center;
}
.form-box{background:white;
padding:40px;
border-radius:15px;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
width:500px;transition:0.3s;
}
.form-box input, .form-box textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #cbd5e1;
}
.form-box input:focus, .form-box textarea:focus{
border-color:#1d4ed8;
outline:none;}
.form-box button{width:100%;
padding:12px;
background:#1d4ed8;
color:white;
border:none;border-radius:10px;
font-size:16px;cursor:pointer;transition:0.3s;
font-weight:600;
}
footer{
text-align:center;
color:#f9fafe;
padding:15px;
font-size:14px;
background:#2563eb;
width: 100%;
margin-top: 130px;
}

</style>
</head>
<body>
<div class="header">
  <div class="nav">
    <h2 style="margin-right:30px;">Online Voting</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/search_voter">Search</a>
    <a href="/verify_voter">Verify</a>
  </div>
  <div style="display:flex;align-items:center;gap:15px;">
    <span class="admin-name">Hello, {{admin}}</span>
  </div>
</div>

<div class="main">
<h2>Edit Voter</h2>
<div class="form-box">
<form method="POST">
<input type="text" name="name" value="{{v[2]}}" placeholder="Full Name" required>
<input type="text" name="phone" value="{{v[3]}}" placeholder="Phone Number" required>
<input type="email" name="email" value="{{v[4]}}" placeholder="Email Address" required>
<textarea name="address" placeholder="Address">{{v[5]}}</textarea>
<input type="password" name="password" value="{{v[6]}}" placeholder="Password" required>
<button type="submit">Update Voter</button>
</form>
</div>
<footer>© 2026 Online Voting System</footer>
</div>
</body>
</html>
